[pytest]
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# Output options.
# NOTE: this file is the single source of pytest config. The previous
# [tool.pytest.ini_options] block in pyproject.toml was silently ignored by
# pytest whenever pytest.ini is present, which is why --cov never ran by default.
# Coverage now lives here so a plain `pytest` reports it.
# Slow biaxial-surface regression tests are marked `slow` (deselected here by
# default); run them with `pytest -m slow` or via the CI slow lane.
addopts =
    -v
    --tb=short
    --strict-markers
    -m "not slow"
    --cov=materials
    --cov-report=term-missing

# Markers
markers =
    slow: marks tests as slow (deselect with '-m "not slow"')
    integration: marks tests as integration tests
    unit: marks tests as unit tests

# Coverage options
[coverage:run]
source = materials
omit =
    */tests/*
    */__pycache__/*
    */site-packages/*

[coverage:report]
precision = 2
exclude_lines =
    pragma: no cover
    def __repr__
    raise AssertionError
    raise NotImplementedError
    if __name__ == .__main__.:
    if TYPE_CHECKING:
    @abstractmethod
