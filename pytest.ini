[pytest]
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# Output options
addopts =
    -v
    --tb=short
    --strict-markers
    -m "not slow"
    --ignore=tests/test_biaxial_surface_intersection.py
    --ignore=tests/test_surface_quality.py
    --ignore=tests/test_vectorization_performance.py
    --ignore=tests/test_pivot_validation.py
    --ignore=tests/test_final_pivot_plot.py
    --ignore=tests/test_pivot_method.py
    --ignore=tests/test_pivot_visualization.py
    --ignore=tests/test_solver_review_fixes.py
    --ignore=tests/integration/test_rugby_ball_surface.py
    --ignore=tests/integration/test_biaxial_utilization_vector.py

# Markers
markers =
    slow: marks tests as slow (deselect with '-m "not slow"')
    integration: marks tests as integration tests
    unit: marks tests as unit tests

# Coverage options
[coverage:run]
source = materials
omit =
    */tests/*
    */__pycache__/*
    */site-packages/*

[coverage:report]
precision = 2
exclude_lines =
    pragma: no cover
    def __repr__
    raise AssertionError
    raise NotImplementedError
    if __name__ == .__main__.:
    if TYPE_CHECKING:
    @abstractmethod
