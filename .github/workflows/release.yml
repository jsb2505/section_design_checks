name: Release

# Publishes to PyPI when a GitHub Release is published.
#
# Uses PyPI Trusted Publishing (OIDC) — no API tokens are stored in the repo.
# One-time setup on pypi.org before the first release:
#   Account -> Publishing -> Add a new pending publisher:
#     PyPI project name: section-design-checks
#     Owner:             jsb2505
#     Repository:        section_design_checks
#     Workflow name:     release.yml
#     Environment:       pypi

on:
  release:
    types: [published]

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: python -m pip install build
      - run: python -m build
      - uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/

  publish:
    needs: build
    runs-on: ubuntu-latest
    environment: pypi
    permissions:
      id-token: write  # required for PyPI Trusted Publishing (OIDC)
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/
      - uses: pypa/gh-action-pypi-publish@release/v1
