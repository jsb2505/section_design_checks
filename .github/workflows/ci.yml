name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install -e ".[dev]"
      # Blocking gate: the full configured ruff ruleset on production code, minus
      # E501 (line-length is enforced via pyproject line-length=120 but kept
      # advisory — the few residual long lines are long HTML/annotation strings).
      - name: ruff (blocking, materials)
        run: ruff check materials --extend-ignore E501
      # Advisory: full ruff incl. E501 and the test tree (surfaces line-length and
      # any test-file lint without blocking).
      - name: ruff (full, advisory)
        run: ruff check materials tests
        continue-on-error: true
      # mypy stays advisory (type-annotation backlog); --ignore-missing-imports
      # silences third-party stub noise (scipy/shapely/plotly).
      - name: mypy (advisory)
        run: mypy materials --ignore-missing-imports
        continue-on-error: true

  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install -e ".[dev,viz]"
      - name: pytest (fast lane + coverage)
        run: pytest

  test-slow:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install -e ".[dev,viz]"
      - name: pytest (slow lane — biaxial surface regression)
        run: pytest -m slow --no-cov
